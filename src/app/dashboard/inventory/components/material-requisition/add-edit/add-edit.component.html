<div class="row">
  <div class="col m-3">
    <div class="btn-btlist" style="top:1% !important">
      <button mat-button type="button" (click)="backToList()">
        <i class="fa fa-arrow-left"></i> Back to List
      </button>
    </div>
    <!-- <div class="row" *ngIf="requestId">
      <div class="col">
        <label>
          SR#:<strong> {{ SRDetails?.request[0].requestNo }}</strong>
        </label>
      </div>
      <div class="col text-end">
        <nxasm-bread-crumb [breadcumbs]="breadcumbs"></nxasm-bread-crumb>
      </div>
    </div> -->
    <form [formGroup]="materialRequisitionForm" style="overflow-x: hidden">
      <div class="accordion" id="accordionExample">
        <div class="accordion-item">
          <h2 class="accordion-header" id="headingOne">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
              data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
              <b>Material Requisition Info</b>
            </button>
          </h2>
          <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne"
            data-bs-parent="#accordionExample">
            <div class="accordion-body">

              <div formGroupName="BasicInputs">
                <div class="row">
                  <div class="col-md-3">
                    <div class="md-3">
                      <label class="mb-2">
                        Request Dept
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <select class="form-select round" name="RequestDept" formControlName="RequestDept">
                          <option [value]="''">
                            Select Reqt Dept
                          </option>
                          <option [value]="1">MEP</option>
                          <option [value]="2">RSS</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        MR Status
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <app-form-field>
                          <select showError [controlName]="'Status'" class="form-select round" name="section"
                            formControlName="Status">
                            <option [value]="''">Select Status</option>
                            <option *ngFor="let p of Status" [value]="p">
                              {{ p.value}}
                            </option>
                          </select>
                        </app-form-field>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Priority
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <app-form-field>
                          <select showError [controlName]="'Priority'" class="form-select round" name="section"
                            formControlName="Priority">
                            <option [value]="''">Select priorities</option>
                            <option *ngFor="let p of Priorities" [value]="p.id">
                              {{ p.name}}
                            </option>
                          </select>
                        </app-form-field>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Location
                      </label>
                      <div>
                        <app-form-field>
                          <select showError [controlName]="'Location'" class="form-select round" name="FailureEffect"
                            formControlName="FailureEffect">
                            <option [value]="''">Select Location
                            <option *ngFor="let p of Location" [value]="p.code">
                              {{ p.value }}
                            </option>
                          </select>
                        </app-form-field>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div>
                      <div class="form-group row">
                        <label class="mb-2"> Required Date </label>
                      </div>
                      <div class="cal-pos" style="display: inline-flex !important;width: 100%;">
                        <input class="form-control" [readonly]="true" placeholder="Select Required Date"
                          formControlName="RequiredDate" [min]="minDate" [readonly]="datePickerOptions.readonly"
                          [owlDateTimeTrigger]="reportedDateCalTrigger" [owlDateTime]="reportedDateCalTrigger" />
                        <owl-date-time #reportedDateCalTrigger
                          [showSecondsTimer]="datePickerOptions.showTimer"></owl-date-time>
                        <mat-icon (click)="reportedDateCalTrigger.open()" class="owl-date-pic"><span
                            class="material-symbols-outlined">
                            calendar_month
                          </span>
                        </mat-icon>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        WO Num
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <input type="text" readonly class="form-control" id="WONum" aria-describedby="WONum" />
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Requested By
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <input type="text" readonly class="form-control" id="requestedBy" formControlName="requestedBy"
                          aria-describedby="requestedBy" />
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Prepare By
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <input type="text" readonly class="form-control" id="prepareBy" formControlName="prepareBy"
                          aria-describedby="prepareBy" />
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div>
                      <div class="form-group row">
                        <label class="mb-2"> Prepare Date </label>
                      </div>
                      <div class="cal-pos" style="display: inline-flex !important;width: 100%;">
                        <input class="form-control" [readonly]="true" placeholder="Select Prepare Date"
                          formControlName="PrepareDate" [min]="minDate" [readonly]="datePickerOptions.readonly"
                          [owlDateTimeTrigger]="reportedDateCalTrigger" [owlDateTime]="reportedDateCalTrigger" />
                        <owl-date-time #reportedDateCalTrigger
                          [showSecondsTimer]="datePickerOptions.showTimer"></owl-date-time>
                        <mat-icon (click)="reportedDateCalTrigger.open()" class="owl-date-pic"><span
                            class="material-symbols-outlined">
                            calendar_month
                          </span>
                        </mat-icon>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Review By
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <input type="text" readonly class="form-control" id="reviewBy" formControlName="reviewBy"
                          aria-describedby="reviewBy" />
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div>
                      <div class="form-group row">
                        <label class="mb-2"> Review Date </label>
                      </div>
                      <div class="cal-pos" style="display: inline-flex !important;width: 100%;">
                        <input class="form-control" [readonly]="true" placeholder="Select Review Date"
                          formControlName="reviewDate" [min]="minDate" [readonly]="datePickerOptions.readonly"
                          [owlDateTimeTrigger]="reportedDateCalTrigger" [owlDateTime]="reportedDateCalTrigger" />
                        <owl-date-time #reportedDateCalTrigger
                          [showSecondsTimer]="datePickerOptions.showTimer"></owl-date-time>
                        <mat-icon (click)="reportedDateCalTrigger.open()" class="owl-date-pic"><span
                            class="material-symbols-outlined">
                            calendar_month
                          </span>
                        </mat-icon>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="mb-3">
                      <label class="mb-2">
                        Approve By
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <input type="text" readonly class="form-control" id="approveBy" formControlName="approveBy"
                          aria-describedby="approveBy" />
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div>
                      <div class="form-group row">
                        <label class="mb-2"> Approve Date </label>
                      </div>
                      <div class="cal-pos" style="display: inline-flex !important;width: 100%;">
                        <input class="form-control" [readonly]="true" placeholder="Select Approve Date"
                          formControlName="approveDate" [min]="minDate" [readonly]="datePickerOptions.readonly"
                          [owlDateTimeTrigger]="reportedDateCalTrigger" [owlDateTime]="reportedDateCalTrigger" />
                        <owl-date-time #reportedDateCalTrigger
                          [showSecondsTimer]="datePickerOptions.showTimer"></owl-date-time>
                        <mat-icon (click)="reportedDateCalTrigger.open()" class="owl-date-pic"><span
                            class="material-symbols-outlined">
                            calendar_month
                          </span>
                        </mat-icon>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-12">
                    <div class="mb-3">
                      <label class="mb-2">
                        Request Description
                        <span class="text-danger">*</span>
                      </label>
                      <div>
                        <textarea maxlength="1024" id="RequestDescription" formControlName="RequestDescription"
                          aria-describedby="RequestDescription" class="form-control" rows="3" style="height: 78px">
                        </textarea>
                        <mat-hint style="color: red;" *ngIf="RequestDescription?.errors?.['maxlength']"
                          align="start">Max 1024 characters</mat-hint>
                        <mat-hint style="float: inline-end;">{{lengthcheck('RequestDescription') || 0}}/1024</mat-hint>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="accordion mt-2" id="accordionImpact">
                <div class="accordion-item">
                  <h2 class="accordion-header" id="headingImpact">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                      data-bs-target="#collapseImpact" aria-expanded="false" aria-controls="collapseImpact">
                      <b>Material Requisition Line Items</b>
                    </button>
                  </h2>
                  <div class="row">
                    <div class="col-12">
                      <div class="col-md-12  my-2">
                        <button type="button" class="btn btn-primary btn-space float-end" (click)="addMaterial()">
                          <i class="fa fa-plus"></i> Add Material
                        </button>
                      </div>
                      <table class="table table-striped table-bordered  min-w-full text-left text-sm font-light">
                        <thead class="border-b font-medium dark:border-neutral-500">
                          <tr>
                            <th scope="col" class="px-6 py-4">No</th>
                            <th scope="col" class="px-6 py-4">Item Type</th>
                            <th scope="col" class="px-6 py-4">Category</th>
                            <th scope="col" class="px-6 py-4">Material Name</th>
                            <th scope="col" class="px-6 py-4">Material Code</th>
                            <th scope="col-1" class="px-6 py-4">UOM</th>
                            <th scope="col" class="px-6 py-4">Req Qty</th>
                            <th class="px-6 py-4 col-1"></th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr *ngFor="let r of materialData;let j= index;let last = last;"
                            class="border-b dark:border-neutral-500 line-through line">
                            <td class="whitespace-nowrap px-6 py-4 font-medium">{{j + 1}}</td>
                            <td class="whitespace-nowrap px-6 py-4">                              
                              <select class="form-select round" placeholder="Material Type"
                                style="width: 100%;height: 2.5em;" id="itemType">
                                <option value="0">Select ItemType</option>
                                <option *ngFor="let a of ItemType" [value]="a.code">
                                  {{a.value}}
                                </option>
                              </select>
                            </td>
                            <td class="whitespace-nowrap px-6 py-4">                              
                               <select showError [controlName]="'Category'" class="form-control round"
                                formControlName="categoryId" name="section">
                                <option value="">Select</option>
                                <option *ngFor="let t of assetCategories" [value]="t.assetCategoryId">
                                    {{t.assetCategoryCode}}
                                </option>
                            </select>
                            </td>
                            <td class="whitespace-nowrap px-6 py-4">                              
                              <select class="form-select round" placeholder="Material Code"
                                style="width: 100%;height: 2.5em;" id="materialCode">
                                <option value="0">Select MaterialCode</option>
                                <option *ngFor="let a of ItemType" [value]="a.code">
                                  {{a.value}}
                                </option>
                              </select>
                            </td>
                            <td class="whitespace-nowrap px-6 py-4">
                              <span>{{r.materialCode}}</span>
                              <div style="display: inline-flex;">
                                <input type="text" [(ngModel)]="r.materialCode" placeholder="Material Name"
                                  class="form-control radius-unset" readonly disabled="" id="location" />
                              </div>
                            </td>
                            <td class="whitespace-nowrap px-6 py-4">
                              <span>{{r.unitOfMeasure}} </span>
                                <input type="text" [(ngModel)]="r.unitOfMeasureId" placeholder="Uom"
                                  class="form-control radius-unset" readonly disabled="" id="materialUom" />
                            </td>
                            <!-- <td class="whitespace-nowrap px-6 py-4">
                              <input type="text" numberDeciamlOnly style="width: 100%;height: 2.5em; max-width: 70px;"
                                [(ngModel)]="r.reqQuantity">
                            </td> -->
                          </tr>
                        </tbody>
                      </table>
                      <div class="col-md-12 text-end my-2">
                        <button type="button" class="btn btn-success btn-space text-end"><i class="fa fa-save"></i>Save
                          As Draft</button>
                        <button type="button" class="btn btn-success btn-space"><i class="fa fa-save"></i>Complete</button>
                         <button type="button" class="btn btn-outline-danger btn-space" mat-dialog-close><i class="fa fa-close"></i> Cancel</button>
                        </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          </div>
          </div>
    </form>
  </div>
</div>
