<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div [innerHtml]="data.body "></div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">{{noMessage}}</button>
  <button mat-button [mat-dialog-close]="true" cdkFocusInitial>{{yesMessage}}</button>
</mat-dialog-actions>
