<h5  mat-dialog-title>Profile {{userName}} </h5> 
<mat-dialog-content class="mat-typography">
    <form class="form-simple p-3" [formGroup]="ProfileForm">
        <div class="col-12">
            <div class="col-12 mb-3">
                <div class="form-group row">
                    <label class="col-3 mb-2">
                        User Name:
                    </label>
                    <div class=" col-9 mb-2 d-col">
                        {{userName}}
                    </div>
                </div>
            </div>
            <div class="col-12 mb-3">
                <div class="form-group row">
                    <label class="mb-2 col-3">
                        Staff Name:
                    </label>
                    <div class="mb-2 col-9 d-col">
                        {{staffName}}
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="form-group row">
                    <label class="mb-2 l-col col-12">Mobile Number:
                        <span class="text-danger">*</span>
                    </label>
                    <div class="col-12">
                        <app-form-field>
                            <input type="text" showError [controlName]="'Mobile'" class="form-control" numbersOnly formControlName="mobile">
                        </app-form-field>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <label class="mb-2 l-col">
                    Email:
                    <span class="text-danger">*</span>
                </label>
                <div>
                    <app-form-field>
                        <input type="text" showError [controlName]="'Email'" class="form-control" formControlName="eMail">
                    </app-form-field>
                </div>
            </div>

        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions class="text-end justify-content-end">
    <button type="button" class="btn btn-outline-danger btn-space" mat-dialog-close><i class="fa fa-close"></i> Cancel</button>
    <button type="button" (click)="save()" class="btn btn-success btn-space" [disabled]="ProfileForm.invalid"><i class="fa fa-save"></i> Save</button>
</mat-dialog-actions>
