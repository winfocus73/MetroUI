<div class="row m-2">
    <div class="col-md-12  my-2" *ngIf="isNoteBtn">
        <h5 class="float-start" style="color: #c8c0c0;">Notes</h5>
        <button *ngIf="notesData.length == 0" type="button" class="btn btn-primary btn-space float-end"
            (click)="addNote()">
            <i class="fa fa-plus"></i> Add Note
        </button>
    </div>

    <table *ngIf="notesData.length > 0"
        class="table table-striped table-bordered  min-w-full text-left text-sm font-light">
        <thead class="border-b font-medium dark:border-neutral-500">
            <tr>
                 <th scope="col" class="px-6 py-4">No</th>
                <th scope="col" class="col-auto x-6 py-4"  style="max-width: 150px;;">Date</th>
                <th scope="col" class="col-auto px-6 py-4" style="max-width: 150px;;" >Commented By</th>
                <th scope="col" class="col px-6 py-4">Comment
                    <span style="color: rgb(207, 204, 204);">  (Max 512 Characters) </span>
                </th>
                <th class="col-auto" style="max-width: 50px;"></th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let r of notesData;let j= index;let last =last" class="border-b dark:border-neutral-500">
                <td class="whitespace-nowrap px-6 py-4 font-medium" style="max-width: 150px;">{{j + 1}}</td>
                <td class="whitespace-nowrap px-6 py-4"  style="max-width: 150px;;">
                    <span>{{r.date | dateTime}}</span>
                </td>
                <td class="whitespace-nowrap px-6 py-4"  style="max-width: 150px;;">
                    <span>{{r.commentorName}}</span>
                </td>
                <td class="whitespace-nowrap px-6 py-4" >
                    <!-- <span *ngIf="r.id" [disabled]>{{r.comment}}</span> -->
                    <textarea  *ngIf="r.id" class="form-control" [(ngModel)]="r.comment"
                    placeholder="Notes" id="notes" rows="5" style="height: 5vh" maxlength="512">
                    </textarea>
                    <textarea  *ngIf="!r.id" class="form-control" [(ngModel)]="r.comment"
                    placeholder="Notes" id="notes" rows="5" style="height: 5vh" maxlength="512">
                    </textarea>
                    <mat-hint style="color: red;" *ngIf="r.comment.length>512" align="start">Max 512 characters</mat-hint>
                    <mat-hint style="float: inline-end;">{{r.comment.length || 0}}/512</mat-hint>
                </td>
                 <td class="text-center align-middle" style="width: 80px;">
                <button *ngIf="r.id" type="button"  class="btn btn-sm btn-success"  (click)="editNotes(r.id, r.comment)">Save</button>
                <button  *ngIf="last && isNoteBtn"  type="button"  class="btn btn-sm btn-primary" (click)="addNote()">
                    <i class="fa fa-plus"></i>
                </button>
            </td>
            </tr>
        </tbody>
    </table>
    <div class="row m-2" *ngIf="notesData.length === 0">
        <span class="bg-warning text-center fw-bold">Notes are not available
        </span>
    </div>
    <div class="col-md-12  my-2">
        <button type="button" *ngIf="notesData.length > 0" class="btn btn-success btn-space float-end"
            (click)="notesDateSave()">
            <i class="fa fa-save"></i> Notes Save
        </button>
    </div>
</div>
